{% extends 'base.html' %}
{% block content %}

<div class="message-show-wrap">
  <div class="message-show-card">

    <div class="message-show-header">
      <a href="/users/{{ message.user.id }}" class="message-show-user">
        <img
          src="{{ message.user.image_url }}"
          alt="Image for {{ message.user.username }}"
          class="message-show-avatar"
        >
        <div class="message-show-meta">
          <h3>@{{ message.user.username }}</h3>
          <p>{{ message.timestamp.strftime('%b %d, %Y') }}</p>
        </div>
      </a>
    </div>

    <div class="message-show-body">
      <p class="single-message">{{ message.text }}</p>
    </div>

    <div class="message-show-footer">
      <a href="/users/{{ message.user.id }}" class="message-show-link">
        <i class="fa fa-user"></i>
        <span>View Profile</span>
      </a>

      {% if g.user and g.user.id == message.user.id %}
      <form method="POST" action="/messages/{{ message.id }}/delete">
        <button type="submit" class="btn btn-outline-danger btn-sm">Delete Post</button>
      </form>
      {% endif %}
    </div>

  </div>
</div>

{% endblock %}
